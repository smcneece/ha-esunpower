name: Feature Request
description: Suggest an idea for Enhanced SunPower integration
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        > **Heads up:** Feature requests and ideas are better suited to [Discussions → Ideas](https://github.com/smcneece/ha-esunpower/discussions/new?category=ideas) where the community can vote and comment. If you'd still like to file this as a tracked issue, go ahead below.

  - type: textarea
    id: feature-description
    attributes:
      label: What would you like to see added?
      description: Describe the feature you'd like
      placeholder: I would like...
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional details (optional)
      description: Screenshots, examples, or other context
      placeholder: Any other relevant details
    validations:
      required: false
