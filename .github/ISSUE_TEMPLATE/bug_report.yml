name: Bug Report
description: Report a problem with Enhanced SunPower integration
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Just need a few quick details to help diagnose the issue.

        **Not sure if it's a bug?** General questions and feature requests belong in [Discussions](https://github.com/smcneece/ha-esunpower/discussions) -- not Issues.

        **Before filing a bug report, please:**
        1. ✅ Check the [Troubleshooting Guide](https://github.com/smcneece/ha-esunpower/blob/main/docs/TROUBLESHOOTING.md) -- your issue may already be documented
        2. ✅ **Reboot your PVS** - Power cycle the PVS and wait 2-3 minutes for it to fully restart
        3. ✅ **Restart Home Assistant** - Settings → System → Restart
        4. ✅ **Check if the issue persists** - Many issues resolve after a fresh restart

        If the problem continues after rebooting, please provide the details below:

  - type: dropdown
    id: integration-version
    attributes:
      label: Integration Version
      description: What version are you running?
      options:
        - v2026.3.3 (latest)
        - v2025.10.7 or older
        - Not sure
      options:
        - v2026.03.2 (latest)
        - v2026.03.1
        - v2025.12.4
        - v2025.12.3
        - v2025.11.x
        - v2025.10.7 or older
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: pvs-model
    attributes:
      label: PVS Model
      description: Which PVS do you have?
      options:
        - PVS5
        - PVS6
        - Not sure
    validations:
      required: true

  - type: input
    id: firmware-build
    attributes:
      label: PVS Firmware BUILD (optional)
      description: "Found at: Settings → Devices & Services → Enhanced SunPower → (device) → Firmware"
      placeholder: "e.g., 61845, 58000"
    validations:
      required: false

  - type: dropdown
    id: battery-system
    attributes:
      label: Do you have a battery system?
      description: SunVault, ESS, or any battery storage connected to PVS
      options:
        - "No"
        - "Yes"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: Describe the issue
      description: What's going wrong?
      placeholder: Tell us what you're seeing...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots (optional)
      description: |
        Copy/paste logs or attach screenshots if helpful.
        **Find logs:** Settings → System → Logs → Search for "sunpower"
      render: shell
    validations:
      required: false
